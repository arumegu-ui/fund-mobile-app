<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="スマホ専用 投資信託 日足終値分析アプリ" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
  <title>投資信託 日足分析</title>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div>
        <p class="eyebrow">Mutual Fund Daily Close</p>
        <h1>投資信託 日足分析</h1>
      </div>
      <button id="refreshBtn" class="icon-btn" type="button" aria-label="更新">更新</button>
    </header>

    <section class="status-card">
      <div>
        <span class="label">データ種別</span>
        <strong>日足・終値ベース</strong>
      </div>
      <div>
        <span class="label">最終更新</span>
        <strong id="updatedAt">--</strong>
      </div>
    </section>

    <nav id="fundTabs" class="fund-tabs" aria-label="銘柄選択"></nav>

    <main>
      <section class="card hero-card">
        <div class="fund-title-row">
          <div>
            <p id="fundCode" class="fund-code">----</p>
            <h2 id="fundName">読み込み中</h2>
          </div>
          <span id="signalBadge" class="badge neutral">中立</span>
        </div>

        <div class="price-grid">
          <div>
            <span class="label">基準価額</span>
            <strong id="lastClose" class="big-number">--</strong>
          </div>
          <div>
            <span class="label">前日比</span>
            <strong id="dayChange" class="big-number">--</strong>
          </div>
          <div>
            <span class="label">20日変化率</span>
            <strong id="change20" class="big-number">--</strong>
          </div>
          <div>
            <span class="label">RSI(14)</span>
            <strong id="rsi14" class="big-number">--</strong>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-title">
          <h3>日足チャート</h3>
          <span id="chartRange">直近90営業日</span>
        </div>
        <canvas id="chart" width="640" height="320" aria-label="基準価額チャート"></canvas>
      </section>

      <section class="card">
        <div class="section-title">
          <h3>テクニカル判定</h3>
          <span>終値のみで計算</span>
        </div>
        <div id="analysisList" class="analysis-list"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h3>銘柄一覧</h3>
          <span>登録済み</span>
        </div>
        <div id="fundList" class="fund-list"></div>
      </section>

      <section class="card tools-card">
        <h3>データ更新</h3>
        <p>
          投資信託は時間足ではなく、原則として日次の基準価額を使います。
          このアプリは <b>日足の終値のみ</b> を前提にしています。
        </p>
        <label class="file-label">
          CSV読込
          <input id="csvInput" type="file" accept=".csv,text/csv" />
        </label>
        <p class="hint">CSV形式：code,date,close</p>
      </section>
    </main>

    <footer>
      <small>Cloudflare Pages / GitHub / Codex 運用向け PWA</small>
    </footer>
  </div>

  <script src="./db.js"></script>
  <script src="./script.js"></script>
</body>
</html>
